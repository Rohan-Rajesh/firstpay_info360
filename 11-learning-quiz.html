<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FirstPay - Learning Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            margin: 20px auto;
            background: #f5f5f5;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #1a1a1a;
            position: relative;
        }

        /* Status bar */
        .status-bar {
            padding: 12px 24px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-bottom: 1px solid #f0f0f0;
        }

        .status-left {
            display: flex;
            gap: 4px;
        }

        .status-right {
            display: flex;
            gap: 4px;
        }

        /* Header with back button */
        .header {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f0f0f0;
            background: white;
        }

        .back-btn {
            width: 32px;
            height: 32px;
            background: #f5f5f5;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }

        .header-spacer {
            width: 32px;
        }

        /* Main content */
        .screen-content {
            flex: 1;
            padding: 16px 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Progress section */
        .progress-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
        }

        .progress-text {
            font-size: 11px;
            color: #999;
            font-weight: 500;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, #4ecdc4 0%, #44a08d 100%);
            border-radius: 2px;
        }

        /* Question Card */
        .question-card {
            background: white;
            padding: 14px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }

        .question-title {
            font-size: 14px;
            font-weight: 700;
            color: #1a1a1a;
            line-height: 1.4;
        }

        /* Answer Options */
        .answer-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
            overflow-y: auto;
        }

        .answer-option {
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: #f9f9f9;
            cursor: pointer;
            font-size: 12px;
            color: #333;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .answer-option:hover {
            border-color: #4ecdc4;
            background: #f0f9f8;
        }

        .answer-option.selected {
            border-color: #4ecdc4;
            background: #e0f8f6;
            color: #1a1a1a;
        }

        .answer-option.correct {
            border-color: #4caf50;
            background: #e8f5e9;
        }

        .answer-option.incorrect {
            border-color: #ff6b6b;
            background: #ffebee;
        }

        /* Action Button */
        .action-button {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            flex-shrink: 0;
        }

        .action-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-left">
                <span>9:41</span>
            </div>
            <div class="status-right">
                <span>◆◆◆</span>
                <span>◆</span>
                <span>◼</span>
            </div>
        </div>

        <!-- Header -->
        <div class="header">
            <a href="14-learning-hub.html" class="back-btn" style="text-decoration: none;">←</a>
            <h1>Quiz</h1>
            <div class="header-spacer"></div>
        </div>

        <!-- Main Content -->
        <div class="screen-content">
            <!-- Progress -->
            <div class="progress-section">
                <div class="progress-text">Question 2 of 5</div>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>

            <!-- Question -->
            <div class="question-card">
                <div class="question-title">What does APR stand for?</div>
            </div>

            <!-- Answer Options -->
            <div class="answer-options">
                <div class="answer-option">
                    Adjusted Payment Rate
                </div>
                <div class="answer-option selected">
                    Annual Percentage Rate
                </div>
                <div class="answer-option">
                    Average Principal Return
                </div>
                <div class="answer-option">
                    Annual Payment Record
                </div>
            </div>

            <!-- Submit Button -->
            <a href="14-learning-hub.html" class="action-button" style="text-decoration: none; display: block; text-align: center;">Submit Answer</a>
        </div>
    </div>
</body>
</html>
