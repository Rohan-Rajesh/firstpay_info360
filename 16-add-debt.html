<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FirstPay - Add Debt</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            margin: 20px auto;
            background: #f5f5f5;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #1a1a1a;
            position: relative;
        }

        /* Status bar */
        .status-bar {
            padding: 12px 24px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-bottom: 1px solid #f0f0f0;
        }

        .status-left {
            display: flex;
            gap: 4px;
        }

        .status-right {
            display: flex;
            gap: 4px;
        }

        /* Header with back button */
        .header {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #f0f0f0;
            background: white;
        }

        .back-btn {
            width: 32px;
            height: 32px;
            background: #f5f5f5;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        /* Main content */
        .screen-content {
            flex: 1;
            padding: 16px 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Progress */
        .progress-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
        }

        .progress-text {
            font-size: 11px;
            color: #999;
            font-weight: 500;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, #ff6b6b 0%, #ff8c8c 100%);
            border-radius: 2px;
        }

        /* Form Section */
        .form-section {
            background: white;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            overflow-y: auto;
        }

        .form-title {
            font-size: 13px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        /* Form Group */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-label {
            font-size: 12px;
            font-weight: 600;
            color: #333;
        }

        .form-input {
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            background: #f9f9f9;
            color: #333;
        }

        .form-input::placeholder {
            color: #999;
        }

        .form-select {
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            background: #f9f9f9;
            color: #333;
        }

        /* Bank Connection */
        .bank-section {
            border-top: 1px solid #f0f0f0;
            padding-top: 10px;
        }

        .bank-title {
            font-size: 13px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .bank-option {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #f9f9f9;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .bank-option:last-of-type {
            margin-bottom: 0;
        }

        .bank-option.selected {
            border-color: #ff6b6b;
            background: #fff5f5;
        }

        .bank-radio {
            width: 20px;
            height: 20px;
            border: 2px solid #ddd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .bank-option.selected .bank-radio {
            border-color: #ff6b6b;
            background: #ff6b6b;
        }

        .bank-radio-inner {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
        }

        .bank-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }

        .bank-name {
            font-size: 12px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .bank-desc {
            font-size: 10px;
            color: #999;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn {
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8c8c 100%);
            color: white;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #1a1a1a;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-left">
                <span>9:41</span>
            </div>
            <div class="status-right">
                <span>◆◆◆</span>
                <span>◆</span>
                <span>◼</span>
            </div>
        </div>

        <!-- Header -->
        <div class="header">
            <a href="08-debt-management.html" class="back-btn" style="text-decoration: none;">←</a>
            <h1>Add Debt</h1>
        </div>

        <!-- Main Content -->
        <div class="screen-content">
            <!-- Progress -->
            <div class="progress-section">
                <div class="progress-text">Step 1 of 2</div>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>

            <!-- Form -->
            <div class="form-section">
                <!-- Debt Details -->
                <div>
                    <div class="form-title">Debt Details</div>
                    
                    <div class="form-group">
                        <label class="form-label">Debt Name</label>
                        <input type="text" class="form-input" placeholder="e.g., Chase Credit Card">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Type</label>
                        <select class="form-select">
                            <option selected disabled>Select debt type</option>
                            <option>Credit Card</option>
                            <option>Personal Loan</option>
                            <option>Student Loan</option>
                            <option>Auto Loan</option>
                            <option>Mortgage</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Balance</label>
                        <input type="number" class="form-input" placeholder="$0.00">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Interest Rate (APR)</label>
                        <input type="number" class="form-input" placeholder="22.5%" step="0.1">
                    </div>
                </div>

                <!-- Bank Connection -->
                <div class="bank-section">
                    <div class="bank-title">Connect Bank Account</div>
                    
                    <div class="bank-option selected">
                        <div class="bank-radio">
                            <div class="bank-radio-inner"></div>
                        </div>
                        <div class="bank-text">
                            <div class="bank-name">Plaid Connect</div>
                            <div class="bank-desc">Secure link to all your accounts</div>
                        </div>
                    </div>

                    <div class="bank-option">
                        <div class="bank-radio"></div>
                        <div class="bank-text">
                            <div class="bank-name">Manual Entry</div>
                            <div class="bank-desc">Add account details manually</div>
                        </div>
                    </div>

                    <div class="bank-option">
                        <div class="bank-radio"></div>
                        <div class="bank-text">
                            <div class="bank-name">Skip for Now</div>
                            <div class="bank-desc">Connect later from settings</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Buttons -->
            <div class="action-buttons">
                <a href="08-debt-management.html" class="btn btn-primary" style="text-decoration: none; display: block; text-align: center;">Continue</a>
                <a href="08-debt-management.html" class="btn btn-secondary" style="text-decoration: none; display: block; text-align: center;">Cancel</a>
            </div>
        </div>
    </div>
</body>
</html>
