<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FirstPay - Splash</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #ffffff;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            margin: 20px auto;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: white;
            position: relative;
            cursor: pointer;
        }

        .splash-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
            padding: 40px 24px;
            text-align: center;
        }

        .logo-container {
            display: flex;
            justify-content: center;
        }

        .logo-circle {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dollar-icon {
            width: 60px;
            height: 60px;
            position: relative;
        }

        .dollar-icon::before {
            content: '';
            position: absolute;
            width: 2px;
            height: 55px;
            background: white;
            left: 50%;
            top: 2px;
            transform: translateX(-50%);
        }

        .dollar-icon::after {
            content: '';
            position: absolute;
            width: 35px;
            height: 14px;
            border: 2px solid white;
            border-radius: 7px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .app-title {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .app-tagline {
            font-size: 16px;
            opacity: 0.95;
            line-height: 1.5;
        }

        .tap-text {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            opacity: 0.8;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.8;
            }
            50% {
                opacity: 0.4;
            }
        }
    </style>
</head>
<body>
    <div class="phone-frame" onclick="window.location.href='01-welcome.html';">
        <div class="splash-content">
            <div class="logo-container">
                <div class="logo-circle">
                    <div class="dollar-icon"></div>
                </div>
            </div>
            <div>
                <div class="app-title">FirstPay</div>
                <div class="app-tagline">Take control of your finances</div>
            </div>
        </div>
        <div class="tap-text">Tap to continue</div>
    </div>
</body>
</html>
