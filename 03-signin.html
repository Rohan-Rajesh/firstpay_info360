<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FirstPay - Sign In</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #ffffff;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            margin: 20px auto;
            background: white;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #1a1a1a;
            position: relative;
        }

        /* Status bar */
        .status-bar {
            padding: 12px 24px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .status-left {
            display: flex;
            gap: 4px;
        }

        .status-right {
            display: flex;
            gap: 4px;
        }

        /* Header with back button */
        .header {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .back-btn {
            width: 32px;
            height: 32px;
            background: #f5f5f5;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        /* Main content */
        .screen-content {
            flex: 1;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        .form-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-title {
            margin-bottom: 8px;
        }

        .form-title h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .form-title p {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }

        /* Form fields */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            padding: 14px 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            background: #f9f9f9;
        }

        .form-group input::placeholder {
            color: #999;
        }

        /* Password recovery link */
        .forgot-password {
            text-align: right;
            font-size: 13px;
        }

        .forgot-password a {
            color: #1e3c72;
            text-decoration: none;
            font-weight: 500;
        }

        /* Buttons */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #1a1a1a;
        }

        /* Divider */
        .divider-text {
            text-align: center;
            font-size: 13px;
            color: #999;
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-left">
                <span>9:41</span>
            </div>
            <div class="status-right">
                <span>◆◆◆</span>
                <span>◆</span>
                <span>◼</span>
            </div>
        </div>

        <!-- Header -->
        <div class="header">
            <a href="01-welcome.html" class="back-btn" style="text-decoration: none;">←</a>
            <h1>Sign In</h1>
        </div>

        <!-- Main Content -->
        <div class="screen-content">
            <!-- Form Title -->
            <div class="form-title">
                <h2>Welcome Back</h2>
                <p>Sign in to your FirstPay account</p>
            </div>

            <!-- Form Fields -->
            <div class="form-section">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="you@example.com">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter your password">
                </div>

                <div class="forgot-password">
                    <a href="#">Forgot password?</a>
                </div>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <a href="06-dashboard.html" class="btn btn-primary" style="text-decoration: none; display: block; text-align: center;">Sign In</a>
                <div class="divider-text">or</div>
                <a href="02-signup.html" class="btn btn-secondary" style="text-decoration: none; display: block; text-align: center;">Create New Account</a>
            </div>
        </div>
    </div>
</body>
</html>
