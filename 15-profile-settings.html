<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FirstPay - Profile Settings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
        .phone-frame { width: 375px; height: 812px; margin: 20px auto; background: #f5f5f5; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15); overflow: hidden; display: flex; flex-direction: column; color: #1a1a1a; }
        .status-bar { padding: 12px 24px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; background: white; border-bottom: 1px solid #f0f0f0; }
        .status-left, .status-right { display: flex; gap: 4px; }
        .header { padding: 20px 24px; background: white; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .header-left h1 { font-size: 24px; font-weight: 700; }
        .header-left p { font-size: 12px; color: #999; }
        .header-right { width: 40px; height: 40px; background: #f5f5f5; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; text-decoration: none; }
        .screen-content { flex: 1; padding: 16px 24px; overflow: hidden; display: flex; flex-direction: column; gap: 12px; }
        .profile-card { background: white; padding: 16px; border-radius: 12px; border: 1px solid #f0f0f0; display: flex; gap: 12px; align-items: center; flex-shrink: 0; }
        .profile-avatar { width: 60px; height: 60px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; flex-shrink: 0; }
        .profile-info { display: flex; flex-direction: column; gap: 4px; }
        .profile-name { font-size: 14px; font-weight: 700; color: #1a1a1a; }
        .profile-email { font-size: 12px; color: #999; }
        .section-title { font-size: 13px; font-weight: 700; color: #1a1a1a; margin-top: 0; text-transform: uppercase; letter-spacing: 0.5px; }
        .settings-list { display: flex; flex-direction: column; gap: 0; background: white; border-radius: 12px; overflow: hidden; border: 1px solid #f0f0f0; flex: 1; overflow-y: auto; flex-shrink: 0; }
        .settings-item { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .settings-item:last-child { border-bottom: none; }
        .settings-label { font-size: 13px; color: #333; font-weight: 500; }
        .settings-arrow { font-size: 16px; color: #ccc; }
        .settings-toggle { width: 44px; height: 28px; background: #e0e0e0; border-radius: 14px; position: relative; cursor: pointer; }
        .settings-toggle.active { background: #667eea; }
        .toggle-circle { width: 24px; height: 24px; background: white; border-radius: 12px; position: absolute; top: 2px; left: 2px; transition: left 0.3s ease; }
        .settings-toggle.active .toggle-circle { left: 18px; }
        .action-button { width: 100%; padding: 12px 16px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; background: #f5f5f5; color: #ff6b6b; flex-shrink: 0; margin-top: 4px; text-decoration: none; display: block; text-align: center; }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="status-bar">
            <div class="status-left"><span>9:41</span></div>
            <div class="status-right"><span>◆◆◆</span><span>◆</span><span>◼</span></div>
        </div>

        <div class="header">
            <div class="header-left">
                <h1>Profile</h1>
                <p>Manage your account</p>
            </div>
            <a href="06-dashboard.html" class="header-right">✎</a>
        </div>

        <div class="screen-content">
            <div class="profile-card">
                <div class="profile-avatar">R</div>
                <div class="profile-info">
                    <div class="profile-name">Rohan Rajesh</div>
                    <div class="profile-email">rohan@example.com</div>
                </div>
            </div>

            <div>
                <div class="section-title">Account</div>
                <div class="settings-list">
                    <div class="settings-item">
                        <div class="settings-label">Personal Information</div>
                        <div class="settings-arrow">›</div>
                    </div>
                    <div class="settings-item">
                        <div class="settings-label">Payment Methods</div>
                        <div class="settings-arrow">›</div>
                    </div>
                    <div class="settings-item">
                        <div class="settings-label">Password</div>
                        <div class="settings-arrow">›</div>
                    </div>
                </div>
            </div>

            <div>
                <div class="section-title">Preferences</div>
                <div class="settings-list">
                    <div class="settings-item">
                        <div class="settings-label">Push Notifications</div>
                        <div class="settings-toggle active">
                            <div class="toggle-circle"></div>
                        </div>
                    </div>
                    <div class="settings-item">
                        <div class="settings-label">Email Alerts</div>
                        <div class="settings-toggle active">
                            <div class="toggle-circle"></div>
                        </div>
                    </div>
                    <div class="settings-item">
                        <div class="settings-label">Dark Mode</div>
                        <div class="settings-toggle">
                            <div class="toggle-circle"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div>
                <div class="section-title">Support</div>
                <div class="settings-list">
                    <div class="settings-item">
                        <div class="settings-label">Help & FAQ</div>
                        <div class="settings-arrow">›</div>
                    </div>
                    <div class="settings-item">
                        <div class="settings-label">Terms of Service</div>
                        <div class="settings-arrow">›</div>
                    </div>
                </div>
            </div>

            <a href="01-welcome.html" class="action-button">Sign Out</a>
        </div>
    </div>
</body>
</html>
