<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FirstPay - Profile Setup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #ffffff;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            margin: 20px auto;
            background: white;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #1a1a1a;
            position: relative;
        }

        /* Status bar */
        .status-bar {
            padding: 12px 24px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .status-left {
            display: flex;
            gap: 4px;
        }

        .status-right {
            display: flex;
            gap: 4px;
        }

        /* Header with back button */
        .header {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .back-btn {
            width: 32px;
            height: 32px;
            background: #f5f5f5;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        /* Main content */
        .screen-content {
            flex: 1;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        /* Progress indicator */
        .progress-section {
            margin-bottom: 16px;
        }

        .progress-text {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, #1e3c72 0%, #2a5298 100%);
            border-radius: 2px;
        }

        /* Form section */
        .form-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-title h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .form-title p {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }

        /* Form group */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group select {
            padding: 14px 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            background: #f9f9f9;
            color: #333;
        }

        .form-group input::placeholder,
        .form-group select::placeholder {
            color: #999;
        }

        /* Buttons */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #1a1a1a;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-left">
                <span>9:41</span>
            </div>
            <div class="status-right">
                <span>◆◆◆</span>
                <span>◆</span>
                <span>◼</span>
            </div>
        </div>

        <!-- Header -->
        <div class="header">
            <a href="02-signup.html" class="back-btn" style="text-decoration: none;">←</a>
            <h1>Profile Setup</h1>
        </div>

        <!-- Main Content -->
        <div class="screen-content">
            <!-- Progress -->
            <div class="progress-section">
                <div class="progress-text">Step 1 of 2</div>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>

            <!-- Form -->
            <div class="form-section">
                <div class="form-title">
                    <h2>Tell us about yourself</h2>
                    <p>This helps us personalize your experience</p>
                </div>

                <div class="form-group">
                    <label>Age</label>
                    <select>
                        <option selected disabled>Select your age</option>
                        <option>18-21</option>
                        <option>22-25</option>
                        <option>26-30</option>
                        <option>30+</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Annual Income</label>
                    <select>
                        <option selected disabled>Select income range</option>
                        <option>$0 - $25,000</option>
                        <option>$25,000 - $50,000</option>
                        <option>$50,000 - $75,000</option>
                        <option>$75,000+</option>
                    </select>
                </div>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <a href="05-financial-goals.html" class="btn btn-primary" style="text-decoration: none; display: block; text-align: center;">Continue</a>
                <a href="06-dashboard.html" class="btn btn-secondary" style="text-decoration: none; display: block; text-align: center;">Skip for now</a>
            </div>
        </div>
    </div>
</body>
</html>
