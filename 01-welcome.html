<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FirstPay - Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #ffffff;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            margin: 20px auto;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: white;
            position: relative;
        }

        /* Status bar */
        .status-bar {
            padding: 12px 24px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-left {
            display: flex;
            gap: 4px;
        }

        .status-right {
            display: flex;
            gap: 4px;
        }

        /* Main content */
        .screen-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 24px;
            padding-bottom: 60px;
        }

        /* Icon/Logo area */
        .icon-container {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
            margin-top: 20px;
        }

        .icon-circle {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dollar-icon {
            width: 50px;
            height: 50px;
            position: relative;
        }

        .dollar-icon::before {
            content: '';
            position: absolute;
            width: 2px;
            height: 45px;
            background: white;
            left: 50%;
            top: 2.5px;
            transform: translateX(-50%);
        }

        .dollar-icon::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 12px;
            border: 2px solid white;
            border-radius: 6px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        /* Text content */
        .text-content {
            text-align: center;
            margin-bottom: 40px;
        }

        .text-content h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .text-content p {
            font-size: 16px;
            line-height: 1.6;
            opacity: 0.95;
            margin-bottom: 12px;
        }

        .text-content .subtitle {
            font-size: 14px;
            opacity: 0.8;
        }

        /* Features list */
        .features {
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .feature-item {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .feature-icon {
            font-size: 20px;
            min-width: 24px;
        }

        .feature-text {
            font-size: 13px;
            line-height: 1.5;
        }

        /* Buttons */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #ff6b6b;
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .btn:active {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-left">
                <span>9:41</span>
            </div>
            <div class="status-right">
                <span>◆◆◆</span>
                <span>◆</span>
                <span>◼</span>
            </div>
        </div>

        <!-- Main Content -->
        <div class="screen-content">
            <!-- Icon -->
            <div class="icon-container">
                <div class="icon-circle">
                    <div class="dollar-icon"></div>
                </div>
            </div>

            <!-- Text -->
            <div class="text-content">
                <h1>FirstPay</h1>
                <p>Take control of your finances</p>
                <p class="subtitle">Learn, budget, and build your financial future</p>
            </div>

            <!-- Features -->
            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon">→</div>
                    <div class="feature-text"><strong>Learn</strong> financial concepts while managing your money</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">→</div>
                    <div class="feature-text"><strong>Track</strong> your spending and debt with ease</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">→</div>
                    <div class="feature-text"><strong>Achieve</strong> your financial goals with guidance</div>
                </div>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <a href="02-signup.html" class="btn btn-primary" style="text-decoration: none; display: block; text-align: center;">Get Started</a>
                <a href="03-signin.html" class="btn btn-secondary" style="text-decoration: none; display: block; text-align: center;">Sign In</a>
            </div>
        </div>
    </div>
</body>
</html>
